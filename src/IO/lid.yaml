# ... DOMAIN
domain:
  type: rectilinear
  lengths:
    x: 0.04
    y: 0.04
  dimensions:
    x: 80
    y: 80
boundary conditions:
  left: 
    type: noslip
  right: 
    type: noslip
  bottom: 
    type: noslip
  top: 
    type: moving wall
    velocity:
      u: 0.007
      v: 0.0
initial conditions:
  gas:
    u: 0.000
    v: 0.000
    p: 0.0
    rho: 1000
  liquid:
    u: 0.0
    v: 0.0
    p: 0.0
    rho: 1000.0
droplet:
  center: # center of the domain
    x: 0.02
    y: 0.01
  diameter: 0.01 # half the channel height
  M: 3 # interface thickness
solver:
  iterations: 100000
  pressure solver:
    method: SOR
    omega: 1.7
dynamic CFL:
  cfli: 0.1
  cflf: 0.3
convergence:
  residual: 1.0e-6
output:
  residuals:
    enabled: true
    frequency: 10
    file: resid.log
  flowviz:
    enabled: true
    frequency: 1000
    directory: output
    ghost cells: true
