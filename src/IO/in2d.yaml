# ... DOMAIN
domain:
  type: rectilinear
  lengths:
    x: 0.02
    y: 0.02
  dimensions:
    x: 80
    y: 80
boundary conditions:
  left: 
    type: noslip wall
  right: 
    type: noslip wall
  bottom: 
    type: noslip wall
  top: 
    type: moving wall
    velocity:
      u: 0.007
      v: 0.0
initial conditions:
  u: 0.000
  v: 0.000
  p: 0.0
solver:
  iterations: 10000
  pressure solver:
    method: SOR
    omega: 1.7
dynamic CFL:
  cfli: 0.1
  cflf: 0.5
convergence:
  residual: 1.0e-6
output:
  residuals:
    enabled: true
    frequency: 10
    file: resid.log
  flowviz:
    enabled: true
    frequency: 100
    directory: output
    ghost cells: true
