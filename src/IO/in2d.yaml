# ... DOMAIN
domain:
  type: rectilinear
  lengths:
    x: 0.04
    y: 0.02
  dimensions:
    x: 200
    y: 100
boundary conditions:
  left: 
    type: periodic
    pressure: 1.0
  right: 
    type: periodic
    pressure: 0.9876
  bottom: 
    type: noslip
  top: 
    type: noslip
initial conditions:
  gas:
    u: 0.007
    v: 0.000
    p: 0.0
    rho: 1
    mu: 1.0e-5
  liquid:
    u: 0.0
    v: 0.0
    p: 0.0
    rho: 1000.0
    mu: 1.0e-3
droplet:
  center: # center of the domain
    x: 0.02
    y: 0.01
  diameter: 0.01 # half the channel height
  M: 3 # interface thickness
solver:
  restart:
    load: true
    save: false
  iterations: 2000
  pressure solver:
    method: SOR
    omega: 1.2
level set:
  reinitialization:
    enabled: true
    iterations: 50
dynamic CFL:
  cfli: 0.1
  cflf: 0.2
convergence:
  residual: 1.0e-6
output:
  residuals:
    enabled: true
    frequency: 10
    file: resid.log
  flowviz:
    enabled: true
    frequency: 10
    directory: output
    ghost cells: true
