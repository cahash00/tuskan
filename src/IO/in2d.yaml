# ... DOMAIN
domain:
  type: rectilinear
  lengths:
    x: 0.04
    y: 0.02
  dimensions:
    x: 30
    y: 15
boundary conditions:
  left: periodic
  right: periodic
  bottom: noslip
  top: noslip
initial conditions:
  u: 0.007
  v: 0.00
solver:
  iterations: 2000
  pressure solver:
    method: SOR
    iterations: 1000
    SOR weight: 1.3
dynamic CFL:
  enabled: true
  cfli: 0.001
  cflf: 0.1
convergence:
  residual: 0.000001
output:
  residuals:
    enabled: true
    frequency: 1
    file: resid.30.dat
  flowviz:
    enabled: true
    frequency: 10000
    directory: output
