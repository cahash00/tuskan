solver:
  restart:
    # load: false
    load: true
    save: true
    ifnu: u.120.lid
    ifnv: v.120.lid
    ifnp: p.120.lid
  iterations: 15000
  pressure solver:
    omega: 1.3
level set:
  reinitialization:
    enabled: true
    iterations: 1
dynamic CFL:
  cfli: 0.01
  cflf: 0.2
convergence:
  residual: 1.0e-6
output:
  residuals:
    enabled: true
    frequency: 10
    file: resid.log
  flowviz:
    enabled: true
    frequency: 100
    directory: output.oper.jp8
    ghost cells: true
    mode: node
    # mode: center
  # ... DOMAIN
domain:
  type: rectilinear
  lengths:
    x: 0.0150
    y: 0.0150
  dimensions:
    x: 120
    y: 120
boundary conditions:
  left: 
    type: noslip
  right: 
    type: noslip
  bottom: 
    type: noslip
  top: 
    type: moving wall
    velocity: 
      u: 10.0
      v: 0.0
jet:
  enabled: true
  u: 0.0
  v: 4.0
  p: 2.0
initial conditions:
  gas:
    u: 0.000
    v: 0.000
    p: 0.0
    rho: 1
    mu: 1.0e-3
  liquid:
    u: 0.0
    v: 0.0
    p: 0.0
    rho: 786.0 # jp8
    # rho: 71.0 # hydrogen
    # rho: 568.0 # ethylene
    mu: 0.0013 # jp8
    # mu: 0.000013 # hydrogen
    # mu: 0.00014 # ethylene
droplet:
  enabled: true
  sigma: 0.0266 # jp8
  # sigma: 0.011 # hydrogen
  # sigma: 0.0024 # ethylene
  # sigma: 0.9 # test
  # sigma: 0.00   # air
  center: # center of the domain
    x: 0.0075
    # y: 0.004
    y: 0.00
  diameter: 0.002 # half the channel height
  M: 3 # interface thickness
