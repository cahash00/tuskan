# ... DOMAIN
domain:
  type: rectilinear
  lengths:
    x: 0.02
    y: 0.04
  dimensions:
    x: 30
    y: 60
boundary conditions:
  left: noslip
  right: noslip
  bottom: periodic
  top: periodic
initial conditions:
  u: 0.000
  v: 0.007
solver:
  iterations: 100000
  pressure solver:
    method: SOR
    omega: 1.3
dynamic CFL:
  cfli: 0.001
  cflf: 0.002
convergence:
  residual: 5.0e-6
output:
  residuals:
    enabled: true
    frequency: 10
    file: resid.log
  flowviz:
    enabled: true
    frequency: 1000
    directory: output
