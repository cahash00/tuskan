# ... DOMAIN
domain:
  lengths:
    x: 0.04
    y: 0.02
  dimensions:
    x: 60
    y: 30
# ... SOLVER
solver:
  iterations: 50000
  CFL: 0.01
dynamic CFL:
  enabled: true
  cfli: 0.01
  cflf: 0.02
convergence:
  residual: 1.0e-4
# ... OUTPUT
output:
  residuals:
    enabled: true
    frequency: 1
    file: resid.30.dat
  flowviz:
    enabled: true
    frequency: 1000
    directory: output
