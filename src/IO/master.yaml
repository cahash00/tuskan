#
# ... Master YAML file for TUSKAN inputs
#
case name: hw4
domain:
  lengths:
    x: 0.04
    y: 0.02
    z: 0.001
  dimensions:
    x: 10
    y: 10
    z: 10
solver:
  iterations: 100000
  CFL: 0.20
dynamic CFL:
  enabled: false
  cfli: 0.001
  cflf: 0.5
  factor: 0.8
convergence:
  residual: 1.0e-6
output:
  residuals:
    enabled: true
    frequency: 1
  flowviz:
    enabled: false
    frequency: 100
    directory: output
    variables:
      - pressure
      - velocity
      - temperature
