# ... DOMAIN
domain:
  type: rectilinear
  lengths:
    x: 0.04
    y: 0.02
  dimensions:
    x: 20
    y: 10
# ... SOLVER
solver:
  iterations: 010000
  CFL: 0.0001
  pressure solver:
    method: Jacobi
    iterations: 1000
    SOR weight: 1.5
dynamic CFL:
  enabled: true
  cfli: 0.0001
  cflf: 0.0002
convergence:
  residual: 0.000001
# ... OUTPUT
output:
  residuals:
    enabled: true
    frequency: 1
    file: resid.30.dat
  flowviz:
    enabled: true
    frequency: 1000
    directory: output
